<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Kaelix</title>
<style>
  :root{
    --bg:#0b0c0f;
    --bg-alt:#111318;
    --card:#15171d;
    --border:#22252d;
    --text:#e9eaee;
    --text-dim:#8a8d98;
    --accent:#c9a24a;
    --accent-dim:#8c7638;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:48px 20px 24px;
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  header h1{
    margin:0;
    font-size:2rem;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text);
  }
  header .line{
    width:44px;height:2px;background:var(--accent);
    margin:14px auto 0;
    border-radius:2px;
  }
  header p{
    margin:14px 0 0;
    color:var(--text-dim);
    font-size:0.85rem;
    letter-spacing:0.04em;
  }

  main{
    max-width:1200px;
    margin:0 auto;
    padding:32px 16px 60px;
  }

  .group-header{
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--accent);
    margin:36px 4px 14px;
    font-weight:600;
  }
  .group-header:first-child{margin-top:0;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
  }
  @media(min-width:640px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
  }

  .card{
    position:relative;
    aspect-ratio:1/1;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    cursor:pointer;
    contain:content;
  }
  .card img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
    opacity:0;
    transition:opacity 0.35s ease;
    background:var(--bg-alt);
  }
  .card img.loaded{opacity:1;}
  .card::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,0.35) 100%);
    pointer-events:none;
  }
  .card:active{transform:scale(0.97);}

  /* Pagination */
  .pagination{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    margin-top:44px;
    padding-top:24px;
    border-top:1px solid var(--border);
  }
  .pagination button{
    min-width:36px;height:36px;
    padding:0 8px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:8px;
    font-size:0.85rem;
    cursor:pointer;
    transition:border-color .2s, color .2s;
  }
  .pagination button:hover{border-color:var(--accent-dim);color:var(--text);}
  .pagination button.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#0b0c0f;
    font-weight:600;
  }
  .pagination button.dots{
    border:none;cursor:default;color:var(--text-dim);
  }
  .pagination button:disabled{opacity:0.35;cursor:default;}

  /* Lightbox */
  .lightbox{
    position:fixed;inset:0;
    background:rgba(6,7,9,0.96);
    display:none;
    align-items:center;justify-content:center;
    z-index:1000;
    padding:24px;
    -webkit-tap-highlight-color:transparent;
  }
  .lightbox.open{display:flex;}
  .lightbox img{
    max-width:100%;max-height:100%;
    border-radius:6px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    animation:zoomIn .2s ease;
  }
  @keyframes zoomIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
  .lightbox .close{
    position:absolute;top:18px;right:22px;
    font-size:1.8rem;color:var(--text);
    background:none;border:none;cursor:pointer;
    line-height:1;
    padding:6px 10px;
  }
  .lightbox .nav-btn{
    position:absolute;top:50%;transform:translateY(-50%);
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    color:var(--text);
    width:44px;height:44px;
    border-radius:50%;
    font-size:1.3rem;
    cursor:pointer;
  }
  .lightbox .prev{left:14px;}
  .lightbox .next{right:14px;}
  @media(max-width:600px){
    .lightbox .nav-btn{width:38px;height:38px;font-size:1.1rem;}
  }

  .empty-note{
    text-align:center;color:var(--text-dim);
    padding:60px 0;font-size:0.9rem;
  }

  footer{
    text-align:center;
    padding:26px 16px 40px;
    color:var(--text-dim);
    font-size:0.75rem;
    letter-spacing:0.05em;
  }
</style>
</head>
<body>

<header>

</header>

<main>
  <div id="gallery"></div>
  <nav class="pagination" id="pagination"></nav>
</main>

<footer>Kaelix Gallery</footer>

/* ============================================================
   BUILD LOGIC — groups entries by active header, paginates,
   lazy-loads visible images only, and renders a full-screen
   lightbox for the whole collection.
   ============================================================ */

// Flatten into render-ready blocks, preserving header grouping
function buildBlocks(entries){
  const blocks = [];
  let currentGroup = null;
  entries.forEach((e, idx) => {
    if(e.n){
      currentGroup = { header: e.n, images: [] };
      blocks.push(currentGroup);
    }
    // image with no name and no active header yet -> headerless block
    if(!currentGroup){
      currentGroup = { header: null, images: [] };
      blocks.push(currentGroup);
    }
    currentGroup.images.push({ file: e.f, globalIndex: idx });
  });
  return blocks;
}

const BLOCKS = buildBlocks(ENTRIES);
const TOTAL_IMAGES = ENTRIES.length;
const TOTAL_PAGES = Math.max(1, Math.ceil(TOTAL_IMAGES / PER_PAGE));

document.getElementById('subCount').textContent =
  TOTAL_IMAGES + (TOTAL_IMAGES === 1 ? ' profile' : ' profiles');

// Precompute a flat list of {header, file, globalIndex} for pagination slicing,
// while remembering where headers change so we can reprint them per page.
const FLAT = [];
BLOCKS.forEach(b => {
  b.images.forEach(img => {
    FLAT.push({ header: b.header, file: img.file, globalIndex: img.globalIndex });
  });
});

let currentPage = 1;
let lightboxIndex = 0;

const galleryEl = document.getElementById('gallery');
const paginationEl = document.getElementById('pagination');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');

function urlFor(file){ return BASE_URL + encodeURIComponent(file); }

function renderPage(page){
  currentPage = Math.min(Math.max(1, page), TOTAL_PAGES);
  const start = (currentPage - 1) * PER_PAGE;
  const end = Math.min(start + PER_PAGE, TOTAL_IMAGES);
  const pageItems = FLAT.slice(start, end);

  galleryEl.innerHTML = '';
  let lastHeaderPrinted = Symbol('none');
  let gridDiv = null;

  pageItems.forEach(item => {
    if(item.header !== lastHeaderPrinted){
      lastHeaderPrinted = item.header;
      if(item.header){
        const h = document.createElement('div');
        h.className = 'group-header';
        h.textContent = item.header;
        galleryEl.appendChild(h);
      }
      gridDiv = document.createElement('div');
      gridDiv.className = 'grid';
      galleryEl.appendChild(gridDiv);
    }
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = item.globalIndex;

    const img = document.createElement('img');
    img.dataset.src = urlFor(item.file);
    img.alt = item.header ? item.header : '';
    img.loading = 'lazy';

    card.appendChild(img);
    card.addEventListener('click', () => openLightbox(item.globalIndex));
    gridDiv.appendChild(card);
  });

  if(pageItems.length === 0){
    galleryEl.innerHTML = '<div class="empty-note">No profiles to display.</div>';
  }

  observeImages();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
}

// Lazy loading via IntersectionObserver — keeps mobile memory/bandwidth low
let observer = null;
function observeImages(){
  if(observer) observer.disconnect();
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const img = entry.target;
        const src = img.dataset.src;
        if(src && img.src !== src){
          img.src = src;
          img.onload = () => img.classList.add('loaded');
        }
        observer.unobserve(img);
      }
    });
  }, { rootMargin: '200px 0px' });

  document.querySelectorAll('.card img[data-src]').forEach(img => observer.observe(img));
}

// Windowed pagination: first, last, current +/-2, ellipses between
function renderPagination(){
  paginationEl.innerHTML = '';

  const addBtn = (label, page, opts = {}) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if(opts.active) btn.classList.add('active');
    if(opts.dots){ btn.classList.add('dots'); btn.disabled = true; }
    if(opts.disabled) btn.disabled = true;
    if(!opts.dots){
      btn.addEventListener('click', () => renderPage(page));
    }
    paginationEl.appendChild(btn);
  };

  addBtn('\u2039', currentPage - 1, { disabled: currentPage === 1 });

  const pages = new Set([1, TOTAL_PAGES, currentPage, currentPage-1, currentPage-2, currentPage+1, currentPage+2]);
  const sorted = [...pages].filter(p => p >= 1 && p <= TOTAL_PAGES).sort((a,b) => a-b);

  let prev = 0;
  sorted.forEach(p => {
    if(prev && p - prev > 1){
      addBtn('\u2026', null, { dots: true });
    }
    addBtn(String(p), p, { active: p === currentPage });
    prev = p;
  });

  addBtn('\u203A', currentPage + 1, { disabled: currentPage === TOTAL_PAGES });
}

// Lightbox
function openLightbox(globalIndex){
  lightboxIndex = globalIndex;
  showLightboxImage();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  lbImg.src = '';
}
function showLightboxImage(){
  const entry = ENTRIES[lightboxIndex];
  lbImg.src = urlFor(entry.f);
  lbImg.alt = entry.n || '';
}
function lbStep(delta){
  lightboxIndex = (lightboxIndex + delta + TOTAL_IMAGES) % TOTAL_IMAGES;
  showLightboxImage();
  // keep gallery page in sync with the image being viewed
  const targetPage = Math.floor(lightboxIndex / PER_PAGE) + 1;
  if(targetPage !== currentPage) renderPage(targetPage);
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => lbStep(-1));
document.getElementById('lbNext').addEventListener('click', () => lbStep(1));
lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', (e) => {
  if(!lightbox.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft') lbStep(-1);
  if(e.key === 'ArrowRight') lbStep(1);
});

// Basic swipe support for mobile lightbox navigation
let touchStartX = null;
lightbox.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; });
lightbox.addEventListener('touchend', (e) => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 40){ dx > 0 ? lbStep(-1) : lbStep(1); }
  touchStartX = null;
});

renderPage(1);
</script>
